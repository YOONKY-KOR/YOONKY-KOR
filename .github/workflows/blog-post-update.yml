name: Update Blog Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update blog posts
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re

          url = "https://yoonky-kor.github.io/index.xml"
          with urllib.request.urlopen(url) as r:
              tree = ET.fromstring(r.read())

          ns = {'atom': 'http://www.w3.org/2005/Atom'}
          items = []
          for item in tree.findall('.//item'):
              title = item.findtext('title', '').strip()
              link  = item.findtext('link', '').strip()
              pub   = item.findtext('pubDate', '').strip()

              skip = ['/about', '/tags', '/categories', '/page']
              if any(s in link for s in skip):
                  continue

              # pubDate → yyyy-MM-dd
              try:
                  from email.utils import parsedate
                  from datetime import date
                  d = parsedate(pub)
                  date_str = f"{d[0]}-{d[1]:02d}-{d[2]:02d}"
              except Exception:
                  date_str = ""

              items.append(f"- [{title}]({link}) - {date_str}")
              if len(items) == 3:
                  break

          block = "\n".join(items)

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          content = re.sub(
              r"<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->",
              f"<!-- BLOG-POST-LIST:START -->\n{block}\n<!-- BLOG-POST-LIST:END -->",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)

          print("Done")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update blog posts"
          git push
